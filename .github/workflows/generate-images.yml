name: Generate images

# Manually-triggered from the Actions tab. Reads REPLICATE_API_TOKEN from
# repo secrets, runs tools/generate.py with your chosen flags, then commits
# any new images back to master so GH Pages auto-rebuilds.

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Replicate model'
        required: true
        default: 'nb'
        type: choice
        options:
          - nb       # google/nano-banana (default, ~$0.04/image — reference-driven, native scale)
          - pro      # flux-1.1-pro (~$0.04/image, text-only)
          - ultra    # flux-1.1-pro-ultra (~$0.06/image)
          - dev      # flux-dev (~$0.025/image)
          - schnell  # flux-schnell (~$0.003/image, fast iteration)
          - sdxl     # stability-ai/sdxl (~$0.011/image)
      aspect:
        description: 'Aspect ratio'
        required: true
        default: '16:9'
        type: choice
        options: ['16:9', '4:3', '1:1']
      scene:
        description: 'Scene id (01-13). Leave blank = all scenes.'
        required: false
        type: string
      slot:
        description: 'Slot (a, b, c). Blank = all slots.'
        required: false
        default: ''
        type: choice
        options: ['', 'a', 'b', 'c']
      hero:
        description: 'Also (re)generate hero.jpg'
        type: boolean
        default: false
      hero_only:
        description: 'Generate ONLY the hero (skip scenes)'
        type: boolean
        default: false
      force:
        description: 'Overwrite existing images'
        type: boolean
        default: false
      parallel:
        description: 'Concurrent predictions (1=sequential, 8=fast)'
        required: false
        default: '8'
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate images
        env:
          # The replicate SDK reads REPLICATE_API_TOKEN by convention; we
          # map either secret name (REPLICATE_KEY or REPLICATE_API_TOKEN)
          # to that env var so the workflow works regardless of which name
          # the secret was added under.
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN || secrets.REPLICATE_KEY }}
        run: |
          set -e
          if [ -z "$REPLICATE_API_TOKEN" ]; then
            echo "::error::Neither REPLICATE_API_TOKEN nor REPLICATE_KEY secret is set. Add one at Settings → Secrets and variables → Actions → New repository secret."
            exit 1
          fi
          ARGS="--model ${{ inputs.model }} --aspect ${{ inputs.aspect }}"
          if [ -n "${{ inputs.scene }}" ]; then ARGS="$ARGS --scene ${{ inputs.scene }}"; fi
          if [ -n "${{ inputs.slot }}" ];  then ARGS="$ARGS --slot ${{ inputs.slot }}";   fi
          if [ "${{ inputs.hero }}" = "true" ];      then ARGS="$ARGS --hero";      fi
          if [ "${{ inputs.hero_only }}" = "true" ]; then ARGS="$ARGS --hero-only"; fi
          if [ "${{ inputs.force }}" = "true" ];     then ARGS="$ARGS --force";     fi
          if [ -n "${{ inputs.parallel }}" ]; then ARGS="$ARGS --parallel ${{ inputs.parallel }}"; fi
          echo "Running: python tools/generate.py $ARGS"
          python tools/generate.py $ARGS

      - name: Commit and push new images
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add img/
          if git diff --cached --quiet; then
            echo "No new images to commit."
          else
            DESC="model=${{ inputs.model }}"
            [ -n "${{ inputs.scene }}" ] && DESC="$DESC scene=${{ inputs.scene }}"
            [ -n "${{ inputs.slot }}" ]  && DESC="$DESC slot=${{ inputs.slot }}"
            [ "${{ inputs.hero }}" = "true" ]      && DESC="$DESC +hero"
            [ "${{ inputs.hero_only }}" = "true" ] && DESC="$DESC hero-only"
            [ "${{ inputs.force }}" = "true" ]     && DESC="$DESC --force"
            git commit -m "ci: regenerate images ($DESC)"
            # Pull --rebase in case master moved while we were generating
            # (a long batch can race with concurrent commits).
            for i in 1 2 3; do
              git pull --rebase origin master && git push && break
              echo "Push attempt $i failed — retrying after a brief wait…"
              sleep 5
            done
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Image generation run" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Model: \`${{ inputs.model }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Aspect: \`${{ inputs.aspect }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Scene: \`${{ inputs.scene || 'all' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Slot: \`${{ inputs.slot || 'all' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Hero: \`${{ inputs.hero }}\` · Hero-only: \`${{ inputs.hero_only }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Force: \`${{ inputs.force }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Site rebuilds at https://zelidav.github.io/jb-nyc-treatment/ in ~30s." >> $GITHUB_STEP_SUMMARY
